name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clone github-readme-stats
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git gh-stats

      - name: Install dependencies (github-readme-stats)
        run: |
          cd gh-stats
          npm ci

      - name: Start github-readme-stats server
        run: |
          cd gh-stats
          PORT=3000 npm start &

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sS http://localhost:3000/api?username=octocat >/dev/null 2>&1; then
              echo "server up"; break
            fi
            sleep 1
          done

      - name: Generate svgs
        env:
          USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir -p assets
          curl -sS "http://localhost:3000/api?username=${USERNAME}&show_icons=true&count_private=true&hide_border=true&title_color=E0A943&icon_color=E0A943&text_color=2d2c26&bg_color=EEE5E9" -o assets/stats.svg
          curl -sS "http://localhost:3000/api/top-langs/?username=${USERNAME}&layout=compact&hide_border=true&title_color=E0A943&text_color=2d2c26&bg_color=EEE5E9" -o assets/top-langs.svg

      - name: Commit and push generated svgs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update generated stats"
            git push
          fi
